image: node:12.5.0
pipelines:
  branches:
    master:
    - step:
        # caches:
        #   - node
        script:
          - apt-get update
          - apt-get install -y zip g++ libcairo2-dev libjpeg62-turbo-dev libpango1.0-dev libgif-dev build-essential
          - npm install --global node-gyp
          - npm install 
          - npm run build
          - zip -r application.zip .
          - pipe: atlassian/aws-code-deploy:0.5.3
            variables:
              AWS_DEFAULT_REGION: $AWS_DEFAULT_REGION
              AWS_ACCESS_KEY_ID: $AWS_ACCESS_KEY_ID
              AWS_SECRET_ACCESS_KEY: $AWS_SECRET_ACCESS_KEY
              APPLICATION_NAME: $APPLICATION_NAME
              S3_BUCKET: $S3_BUCKET
              COMMAND: 'upload'
              ZIP_FILE: 'application.zip'
              VERSION_LABEL: 'custimoo-kitbuilder-2.0'